<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNLOCK Extra – Intermediate English Course</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { font-family: 'Inter', sans-serif; }
      .card-flip { perspective: 1000px; }
      .card-flip-inner { transition: transform 0.55s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; }
      .card-flip.flipped .card-flip-inner { transform: rotateY(180deg); }
      .card-front, .card-back { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
      .card-back { transform: rotateY(180deg); }
      @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
      .fade-up { animation: fadeUp 0.3s ease-out; }
      ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
